<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉢-bit | hachi-bit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --yellow: #F5C400;
      --yellow-dark: #D4A800;
      --yellow-light: #FFF3B0;
      --white: #FAFAF5;
      --gray: #1a1a1a;
      --card-bg: rgba(245, 196, 0, 0.04);
      --card-border: rgba(245, 196, 0, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Zen Maru Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ===== 背景レイヤー ===== */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      top: -15%;
      left: -10%;
      background: radial-gradient(circle, rgba(245,196,0,0.10) 0%, transparent 65%);
      animation: glowDrift1 12s ease-in-out infinite;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(245,196,0,0.07) 0%, transparent 65%);
      animation: glowDrift2 15s ease-in-out infinite;
    }

    @keyframes glowDrift1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, 30px); }
    }

    @keyframes glowDrift2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, -40px); }
    }

    /* 六角形グリッド背景 */
    .hex-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hex-bg svg {
      width: 100%;
      height: 100%;
      opacity: 0.035;
    }

    /* 浮遊パーティクル */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--yellow);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat linear infinite;
    }

    .particle:nth-child(1)  { left:  8%; animation-duration: 18s; animation-delay: 0s; }
    .particle:nth-child(2)  { left: 22%; animation-duration: 22s; animation-delay: 3s; }
    .particle:nth-child(3)  { left: 38%; animation-duration: 16s; animation-delay: 6s; }
    .particle:nth-child(4)  { left: 55%; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5)  { left: 70%; animation-duration: 24s; animation-delay: 4s; }
    .particle:nth-child(6)  { left: 85%; animation-duration: 19s; animation-delay: 8s; }
    .particle:nth-child(7)  { left: 15%; animation-duration: 21s; animation-delay: 10s; }
    .particle:nth-child(8)  { left: 48%; animation-duration: 17s; animation-delay: 5s; }
    .particle:nth-child(9)  { left: 62%; animation-duration: 23s; animation-delay: 7s; }
    .particle:nth-child(10) { left: 92%; animation-duration: 20s; animation-delay: 2s; }

    @keyframes particleFloat {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; transform: translateY(90vh) scale(1); }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
    }

    /* ===== メインコンテナ ===== */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 48px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ===== アイコン ===== */
    .icon-area {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background: linear-gradient(145deg, #F5C400, #D4A800);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      position: relative;
      box-shadow:
        0 0 0 3px var(--black),
        0 0 0 5px rgba(245,196,0,0.6),
        0 0 40px rgba(245,196,0,0.25),
        0 4px 20px rgba(0,0,0,0.5);
      animation: iconPulse 4s ease-in-out infinite;
    }

    .icon-area .icon-clip {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .icon-area .hachi-icon {
      width: 80%;
      height: 80%;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .icon-area::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(245,196,0,0.15);
      animation: ringRotate 20s linear infinite;
    }

    .icon-area::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.20), transparent 55%);
      z-index: 2;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 3px var(--black), 0 0 0 5px rgba(245,196,0,0.6), 0 0 40px rgba(245,196,0,0.25), 0 4px 20px rgba(0,0,0,0.5); }
      50%      { box-shadow: 0 0 0 3px var(--black), 0 0 0 5px rgba(245,196,0,0.8), 0 0 60px rgba(245,196,0,0.4), 0 4px 20px rgba(0,0,0,0.5); }
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* 軌道ドット */
    .orbit-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--yellow);
      border-radius: 50%;
      top: -12px;
      left: 50%;
      transform-origin: 50% calc(50% + 64px);
      animation: ringRotate 20s linear infinite;
      box-shadow: 0 0 8px rgba(245,196,0,0.8);
    }

    /* ===== 名前 ===== */
    .name {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 30px;
      letter-spacing: 0.06em;
      color: var(--yellow);
      margin-bottom: 4px;
      text-align: center;
      text-shadow: 0 0 20px rgba(245,196,0,0.3);
    }

    .name-jp {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.25em;
      margin-bottom: 18px;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
    }

    /* ===== タグライン ===== */
    .tagline {
      font-size: 13.5px;
      color: rgba(255,255,255,0.50);
      text-align: center;
      line-height: 1.9;
      margin-bottom: 36px;
      letter-spacing: 0.06em;
    }

    .tagline em {
      color: var(--yellow);
      font-style: normal;
      font-weight: 700;
    }

    /* ===== セパレーター ===== */
    .sep {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(245,196,0,0.25) 30%, rgba(245,196,0,0.35) 50%, rgba(245,196,0,0.25) 70%, transparent 100%);
      margin-bottom: 28px;
      position: relative;
    }

    .sep::after {
      content: '◆';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8px;
      color: var(--yellow);
      background: var(--black);
      padding: 0 12px;
      opacity: 0.5;
    }

    /* ===== セクションラベル ===== */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(245,196,0,0.4);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    /* ===== リンクボタン ===== */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: var(--card-bg);
      color: var(--white);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,196,0,0.06) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* ホバー時にボーダーが光る */
    .link-btn::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(245,196,0,0.5), transparent 40%, transparent 60%, rgba(245,196,0,0.3));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-btn:hover {
      border-color: rgba(245,196,0,0.5);
      transform: translateY(-3px);
      box-shadow:
        0 12px 40px rgba(245,196,0,0.15),
        0 4px 12px rgba(0,0,0,0.4);
      background: rgba(245,196,0,0.06);
    }

    .link-btn:hover::before {
      opacity: 1;
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    .link-btn:active {
      transform: translateY(-1px) scale(0.995);
    }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s;
      background: rgba(245,196,0,0.10);
    }

    .link-btn:hover .link-icon {
      background: rgba(245,196,0,0.20);
      box-shadow: 0 0 16px rgba(245,196,0,0.15);
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
      fill: var(--yellow);
      transition: transform 0.3s;
    }

    .link-btn:hover .link-icon svg {
      transform: scale(1.1);
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 2px;
      letter-spacing: 0.03em;
    }

    .link-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.30);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: rgba(245,196,0,0.35);
      font-size: 16px;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .link-btn:hover .link-arrow {
      transform: translateX(4px);
      color: var(--yellow);
    }

    /* ===== セクション間スペーサー ===== */
    .spacer {
      height: 24px;
      width: 100%;
    }

    /* ===== フッター ===== */
    .footer {
      margin-top: 48px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .footer-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.12em;
    }

    .footer-badge span {
      color: var(--yellow);
      opacity: 0.35;
      font-size: 7px;
    }

    .footer-copy {
      font-size: 10px;
      color: rgba(255,255,255,0.10);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.08em;
    }

    /* ===== フェードインアニメーション ===== */
    .container > * {
      animation: fadeUp 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      opacity: 0;
    }

    .icon-area        { animation-delay: 0.05s; }
    .name             { animation-delay: 0.12s; }
    .name-jp          { animation-delay: 0.18s; }
    .tagline          { animation-delay: 0.24s; }
    .sep              { animation-delay: 0.30s; }
    .section-label:nth-of-type(1) { animation-delay: 0.34s; }
    .links:nth-of-type(1)         { animation-delay: 0.38s; }
    .spacer           { animation-delay: 0.42s; }
    .section-label:nth-of-type(2) { animation-delay: 0.46s; }
    .links:nth-of-type(2)         { animation-delay: 0.50s; }
    .footer           { animation-delay: 0.58s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== reduced motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
